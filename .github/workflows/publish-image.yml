name: Publish And Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pilot-frontend-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pilot-frontend

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -eu

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"

            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/root/projects/pilot-deploy"
            fi

            cd "$DEPLOY_PATH"

            if [ ! -f .env.runtime ]; then
              echo ".env.runtime was not found in $DEPLOY_PATH"
              exit 1
            fi

            set -a
            . ./.env.runtime
            set +a

            if [ -z "${PILOT_JWT_SIGNING_KEY:-}" ]; then
              echo "PILOT_JWT_SIGNING_KEY must be configured in server-side .env.runtime"
              exit 1
            fi

            if [ "${#PILOT_JWT_SIGNING_KEY}" -lt 32 ]; then
              echo "PILOT_JWT_SIGNING_KEY must be at least 32 characters"
              exit 1
            fi

            if [ "${PILOT_ENABLE_SUPER_ADMIN_PASSWORD_BOOTSTRAP:-false}" = "true" ]; then
              echo "Warning: PILOT_ENABLE_SUPER_ADMIN_PASSWORD_BOOTSTRAP is true on production"
            fi

            docker compose --env-file .env.runtime -f docker-compose.production.yml config > /dev/null
            docker compose --env-file .env.runtime -f docker-compose.production.yml pull pilot-frontend
            docker compose --env-file .env.runtime -f docker-compose.production.yml up -d pilot-frontend

            sleep 5
            curl -fsS http://127.0.0.1:8086 > /dev/null
