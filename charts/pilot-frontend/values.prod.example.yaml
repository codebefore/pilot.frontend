# Example production values. Do not put secret values in this file.

replicaCount: 2

image:
  repository: ghcr.io/codebefore/pilot-frontend
  tag: prod
  pullPolicy: IfNotPresent

runtimeConfig:
  publicUrl: https://pilotyanimda.com
  apiBaseUrl: https://api.pilotyanimda.com
  authApiBaseUrl: https://api.pilotyanimda.com/v1/identity
  candidateApiBaseUrl: https://api.pilotyanimda.com/v1/candidates
  catalogApiBaseUrl: https://api.pilotyanimda.com/v1/catalog
  documentApiBaseUrl: https://api.pilotyanimda.com/v1/document
  financeApiBaseUrl: https://api.pilotyanimda.com/v1/finance
  mebbisApiBaseUrl: https://api.pilotyanimda.com/v1/mebbis
  platformApiBaseUrl: https://api.pilotyanimda.com/v1/platform
  trainingApiBaseUrl: https://api.pilotyanimda.com/v1/training

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ingress:
  enabled: true
  className: nginx
  host: pilotyanimda.com
  tls:
    - secretName: pilot-frontend-prod-tls
      hosts:
        - pilotyanimda.com
